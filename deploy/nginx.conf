# 热剧榜 Nginx 配置文件
# 使用方法：
# 1. 复制到 /etc/nginx/sites-available/rejubang
# 2. ln -sf /etc/nginx/sites-available/rejubang /etc/nginx/sites-enabled/
# 3. nginx -t && systemctl restart nginx

server {
    listen 80;
    server_name nailao.asia api.nailao.asia;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.nailao.asia;

    ssl_certificate /etc/letsencrypt/live/nailao.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nailao.asia/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css;
    gzip_min_length 256;

    # API代理
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }

    location / {
        return 200 '{"service":"rejubang-api","status":"running"}';
        add_header Content-Type application/json;
    }
}

server {
    listen 443 ssl http2;
    server_name nailao.asia;

    ssl_certificate /etc/letsencrypt/live/nailao.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nailao.asia/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        root /var/www/rejubang;
        index index.html;
    }
}
